services:
  stockpilot-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/faiznutes/gudang1-frontend:latest
    restart: unless-stopped
    depends_on:
      - stockpilot-backend
    expose:
      - 80
    networks:
      - coolify
      - stockpilot-internal
    labels:
      - traefik.enable=true
      - traefik.http.routers.stockpilot.rule=Host(`gudang.faiznute.site`)
      - traefik.http.services.stockpilot.loadbalancer.server.port=80

  stockpilot-backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    image: ghcr.io/faiznutes/gudang1-backend:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://stockpilot:stockpilot@stockpilot-postgres:5432/stockpilot?schema=public
      JWT_SECRET: ${JWT_SECRET:-replace-with-production-access-secret}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-replace-with-production-refresh-secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://gudang.faiznute.site}
      PORT: 4000
    depends_on:
      stockpilot-postgres:
        condition: service_healthy
    expose:
      - 4000
    networks:
      - stockpilot-internal

  stockpilot-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: stockpilot
      POSTGRES_USER: stockpilot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockpilot}
    volumes:
      - stockpilot-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockpilot -d stockpilot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stockpilot-internal

volumes:
  stockpilot-postgres-data:

networks:
  coolify:
    external: true
  stockpilot-internal:
    internal: true
