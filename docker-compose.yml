services:
    stockpilot:
        image: ghcr.io/faiznutes/gudang1:latest
        pull_policy: always
        restart: unless-stopped
        expose:
            - 80
        networks:
            - coolify
        labels:
            - traefik.enable=true
            - traefik.http.routers.stockpilot.rule=Host(`gudang.faiznute.site`)
            - traefik.http.services.stockpilot.loadbalancer.server.port=80

networks:
    coolify:
        external: true