services:
  stockpilot-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/faiznutes/gudang1-frontend:latest
    restart: unless-stopped
    depends_on:
      stockpilot-backend:
        condition: service_healthy
    expose:
      - 80
    ports:
      - 127.0.0.1:19091:80
    networks:
      - coolify
      - stockpilot-internal
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.stockpilot-gzip.compress=true
      - traefik.http.middlewares.stockpilot-redirect-to-https.redirectscheme.scheme=https
      - traefik.http.routers.stockpilot-frontend-http.entryPoints=http
      - traefik.http.routers.stockpilot-frontend-http.rule=Host(`gudang.faiznute.site`) && PathPrefix(`/`)
      - traefik.http.routers.stockpilot-frontend-http.middlewares=stockpilot-redirect-to-https
      - traefik.http.routers.stockpilot-frontend-http.service=stockpilot-frontend
      - traefik.http.routers.stockpilot-frontend-https.entryPoints=https
      - traefik.http.routers.stockpilot-frontend-https.rule=Host(`gudang.faiznute.site`) && PathPrefix(`/`)
      - traefik.http.routers.stockpilot-frontend-https.priority=100
      - traefik.http.routers.stockpilot-frontend-https.middlewares=stockpilot-gzip
      - traefik.http.routers.stockpilot-frontend-https.service=stockpilot-frontend
      - traefik.http.routers.stockpilot-frontend-https.tls=true
      - traefik.http.routers.stockpilot-frontend-https.tls.certresolver=letsencrypt
      - traefik.http.services.stockpilot-frontend.loadbalancer.server.port=80

  stockpilot-backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    image: ghcr.io/faiznutes/gudang1-backend:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://stockpilot:${POSTGRES_PASSWORD:-stockpilot}@stockpilot-postgres:5432/stockpilot?schema=public
      JWT_SECRET: ${JWT_SECRET:-replace-with-production-access-secret}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-replace-with-production-refresh-secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://gudang.faiznute.site}
      PORT: 4000
    depends_on:
      stockpilot-postgres:
        condition: service_healthy
    expose:
      - 4000
    ports:
      - 127.0.0.1:19092:4000
    labels:
      - traefik.enable=true
      - traefik.http.routers.stockpilot-api-http.entryPoints=http
      - traefik.http.routers.stockpilot-api-http.rule=Host(`gudang.faiznute.site`) && PathPrefix(`/api`)
      - traefik.http.routers.stockpilot-api-http.priority=200
      - traefik.http.routers.stockpilot-api-http.middlewares=stockpilot-redirect-to-https
      - traefik.http.routers.stockpilot-api-http.service=stockpilot-api
      - traefik.http.routers.stockpilot-api-https.entryPoints=https
      - traefik.http.routers.stockpilot-api-https.rule=Host(`gudang.faiznute.site`) && PathPrefix(`/api`)
      - traefik.http.routers.stockpilot-api-https.priority=200
      - traefik.http.routers.stockpilot-api-https.service=stockpilot-api
      - traefik.http.routers.stockpilot-api-https.tls=true
      - traefik.http.routers.stockpilot-api-https.tls.certresolver=letsencrypt
      - traefik.http.services.stockpilot-api.loadbalancer.server.port=4000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - coolify
      - stockpilot-internal

  stockpilot-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: stockpilot
      POSTGRES_USER: stockpilot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockpilot}
    volumes:
      - stockpilot-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockpilot -d stockpilot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stockpilot-internal

volumes:
  stockpilot-postgres-data:

networks:
  coolify:
    external: true
  stockpilot-internal:
    internal: true
