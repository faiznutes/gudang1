<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="StockPilot" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="msapplication-TileColor" content="#2563eb" />
    <meta name="format-detection" content="telephone=no" />
    <title>StockPilot - Gudang Digital</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      html, body {
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
      }
      body {
        padding-top: env(safe-area-inset-top);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
        padding-bottom: env(safe-area-inset-bottom);
      }
      @supports (padding-top: env(safe-area-inset-top)) {
        body {
          min-height: 100vh;
          min-height: -webkit-fill-available;
        }
      }
    </style>
  </head>
  <body class="font-sans antialiased">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const appScript = document.querySelector('script[type="module"][src*="/assets/index-"]');
          const swVersion = appScript?.getAttribute('src') || 'dev';
          navigator.serviceWorker.register(`/sw.js?v=${encodeURIComponent(swVersion)}`).catch(() => {});
        });
      }
      
      // Lock to portrait on mobile/tablet
      const lockPortrait = () => {
        if (window.innerWidth < 1024) {
          if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('portrait').catch(() => {});
          }
        }
      };
      if (document.readyState === 'complete') {
        lockPortrait();
      } else {
        window.addEventListener('load', lockPortrait);
      }
    </script>
  </body>
</html>
